name: Sync Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-evident:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Evident sync
        working-directory: evident-sync/src
        env:
          EVIDENT_KEY_AGEQUIPMENT:      ${{ secrets.EVIDENT_KEY_AGEQUIPMENT }}
          EVIDENT_KEY_ACTIONPLUMBING:   ${{ secrets.EVIDENT_KEY_ACTIONPLUMBING }}
          EVIDENT_KEY_BAUERFOUNDATION:  ${{ secrets.EVIDENT_KEY_BAUERFOUNDATION }}
          EVIDENT_KEY_CPKANSASCITY:     ${{ secrets.EVIDENT_KEY_CPKANSASCITY }}
          EVIDENT_KEY_CAPITALROAD:      ${{ secrets.EVIDENT_KEY_CAPITALROAD }}
          EVIDENT_KEY_EMMES:            ${{ secrets.EVIDENT_KEY_EMMES }}
          EVIDENT_KEY_EMERYSAPPANDSONS: ${{ secrets.EVIDENT_KEY_EMERYSAPPANDSONS }}
          EVIDENT_KEY_GARTPROPERTIES:   ${{ secrets.EVIDENT_KEY_GARTPROPERTIES }}
          EVIDENT_KEY_KOLBGRADING:      ${{ secrets.EVIDENT_KEY_KOLBGRADING }}
          EVIDENT_KEY_MIZUHOBANK:       ${{ secrets.EVIDENT_KEY_MIZUHOBANK }}
          EVIDENT_KEY_MUSSELMANHALL:    ${{ secrets.EVIDENT_KEY_MUSSELMANHALL }}
          EVIDENT_KEY_PARAGONGEO:       ${{ secrets.EVIDENT_KEY_PARAGONGEO }}
          EVIDENT_KEY_SCANDROLI:        ${{ secrets.EVIDENT_KEY_SCANDROLI }}
          EVIDENT_KEY_SKYLINE:          ${{ secrets.EVIDENT_KEY_SKYLINE }}
          EVIDENT_KEY_THEABBEYCOMPANY:  ${{ secrets.EVIDENT_KEY_THEABBEYCOMPANY }}
          EVIDENT_KEY_TRINITYCHEMICAL:  ${{ secrets.EVIDENT_KEY_TRINITYCHEMICAL }}
          EVIDENT_KEY_UNITEDCOAL:       ${{ secrets.EVIDENT_KEY_UNITEDCOAL }}
          GOOGLE_SERVICE_ACCOUNT_KEY:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID:              ${{ secrets.GOOGLE_SHEET_ID }}
        run: node sync.js

      - name: Run engagement sync (Google Sheets)
        working-directory: evident-sync/src
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID:            ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB:           'Email Events'
          DATA_DIR:                   ${{ github.workspace }}/data/evident
        run: node sync-engagement.js

      - name: Commit Evident data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: evident sync [skip ci]'
          file_pattern: 'data/evident/**'
          push_options: '--force-with-lease'

  sync-trustlayer:
    runs-on: ubuntu-latest
    needs: sync-evident
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run TrustLayer sync
        working-directory: trustlayer-sync/src
        env:
          TL_TOKEN_BLOCK_REAL_ESTATE:   ${{ secrets.TL_TOKEN_BLOCK_REAL_ESTATE }}
          TL_TOKEN_CMI:                 ${{ secrets.TL_TOKEN_CMI }}
          TL_TOKEN_QTS:                 ${{ secrets.TL_TOKEN_QTS }}
          TL_TOKEN_EXCEL_CONSTRUCTORS:  ${{ secrets.TL_TOKEN_EXCEL_CONSTRUCTORS }}
          TL_TOKEN_DEMOCLIENT:          ${{ secrets.TL_TOKEN_DEMOCLIENT }}
        run: node sync.js && node transform.js

      - name: Commit TrustLayer data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: trustlayer sync [skip ci]'
          file_pattern: 'data/trustlayer/**'
          push_options: '--force-with-lease'

  snapshot:
    runs-on: ubuntu-latest
    needs: [sync-evident, sync-trustlayer]
    if: always() && (needs.sync-evident.result == 'success' || needs.sync-trustlayer.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest committed data
        run: git pull --rebase origin main

      - name: Take daily snapshot and push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%Y-%m)

          # Evident snapshot
          EV_DIR="snapshots/${YEAR}/${MONTH}"
          mkdir -p "$EV_DIR"
          [ -f "data/evident/insureds.csv"  ] && cp "data/evident/insureds.csv"  "$EV_DIR/insureds.csv"
          [ -f "data/evident/criteria.csv"  ] && cp "data/evident/criteria.csv"  "$EV_DIR/criteria.csv"
          [ -f "data/evident/coverages.csv" ] && cp "data/evident/coverages.csv" "$EV_DIR/coverages.csv"

          # TrustLayer snapshot
          TL_DIR="snapshots/trustlayer/${YEAR}/${MONTH}"
          mkdir -p "$TL_DIR"
          [ -f "data/trustlayer/insureds.csv"  ] && cp "data/trustlayer/insureds.csv"  "$TL_DIR/insureds.csv"
          [ -f "data/trustlayer/criteria.csv"  ] && cp "data/trustlayer/criteria.csv"  "$TL_DIR/criteria.csv"
          [ -f "data/trustlayer/coverages.csv" ] && cp "data/trustlayer/coverages.csv" "$TL_DIR/coverages.csv"

          echo "Snapshot: EV -> ${EV_DIR}, TL -> ${TL_DIR}"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/HUBCertSecure/client-management-platform.git"

          git add snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi

          git commit -m "chore: daily snapshot ${DATE} [skip ci]"
          git push origin main --force-with-lease
          echo "Snapshot pushed successfully"
